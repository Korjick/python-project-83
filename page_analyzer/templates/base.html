<!doctype html>
<html lang="ru">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}Анализатор страниц{% endblock %}</title>
    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet"
    >
</head>
<body class="bg-light d-flex flex-column min-vh-100">
<header>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container-fluid">
            <a class="navbar-brand" href="{{ url_for('index') }}">Анализатор страниц</a>
            <div class="navbar-nav">
                <a class="nav-link link-secondary" href="{{ url_for('urls_index') }}">Сайты</a>
            </div>
        </div>
    </nav>
</header>
{% with messages = get_flashed_messages(with_categories=true) %}
    {% if messages %}
        {% for category, message in messages %}
            <div class="alert alert-{{ category }} mb-0" role="alert">
                {{ message }}
            </div>
        {% endfor %}
    {% endif %}
{% endwith %}
<main class="container-lg mt-3 flex-grow-1">
    {% block content %}{% endblock %}
</main>
<footer class="border-top py-3 mt-auto">
    <div class="container text-center">
        <a href="https://hexlet.io">Hexlet</a>
    </div>
</footer>
</body>
</html>
